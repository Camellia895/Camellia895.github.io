<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网页</title> <!-- 或者你修改后的标题 -->

    <style>
        /* 这里是 CSS 代码 */
        body {
            /* 指定背景图片的路径 */
            /* 请确保 'images/background.jpg' 和你的实际图片路径及文件名一致 */
            background-image: url('images/Catgirl.png');

            /* 让背景图片覆盖整个页面 */
            background-size: cover;

            /* 背景图片不重复平铺 */
            background-repeat: no-repeat;

            /* 当内容超出屏幕时,背景图片固定,不随滚动条滚动 (可选) */
            background-attachment: fixed;

            /* 让背景图片在视口中居中 (可选) */
            background-position: center center;

            /* 为了让文字在深色背景上更易读,可以设置一个默认的文字颜色 */
            /* 如果你的背景比较亮,可能需要深色文字,比如 color: #333; */
            color: #ddd4d4; /* 假设你的背景图片比较暗,用白色文字 */

            /* (可选) 为了防止文字紧贴浏览器边缘,可以给 body 加一点内边距 */
            padding: 20px;
        }

        /* (可选) 如果背景图片很暗,而你的标题颜色默认是黑色,可能会看不清 */
        /* 你可以为标题也单独设置颜色 */
        h1, h2 {
            /* color: #f0f0f0; */ /* 这是一个浅灰色,如果白色太刺眼可以试试 */
        }
    </style>

</head>
<body>
    <!-- 你之前写的 body 内容保持不变 -->
    <h1>欢迎来到我的数字花园</h1>
    <p>这里是我记录想法,展示作品的地方.它会像一个不断生长的花园一样,充满了我的探索和发现.</p>

    <div>
        <h2>我的排版设计</h2>
        <p>这里我会放上我之前做的一些有趣的排版尝试和作品.希望能让你眼前一亮!</p>
    </div>

    <div>
        <h2>AI绘画探索(我的科技树!)</h2>
        <p>最近沉迷AI绘画,下面是我在这个领域的一些阶段性成果,我喜欢把它们想象成一个不断分支的科技树.</p>
    </div>

    <div>
        <h2>随便写写(我的日记)</h2>
        <p>一些不成熟的想法,一些日常的记录,一些碎碎念.</p>
    </div>

    <p>感谢你的来访!</p>
</body>
</html>
