<script>
    document.addEventListener('DOMContentLoaded', function() {
    // DOM 内容加载完成后执行

    const progressBar = document.querySelector('md-circular-progress');
    const loaderOverlay = document.getElementById('loader-overlay');
    const mainContent = document.getElementById('main-content');

    let progressValue = 0;
    let progressInterval;

    function updateProgress(targetValue, duration = 500) {
        // 清除之前的间隔，以防万一
        if (progressInterval) {
            clearInterval(progressInterval);
        }

        const increment = (targetValue - progressValue) / (duration / 50); // 每50ms更新一次

        progressInterval = setInterval(() => {
            progressValue += increment;
            if ((increment > 0 && progressValue >= targetValue) || (increment < 0 && progressValue <= targetValue)) {
                progressValue = targetValue; // 确保精确到达目标值
                clearInterval(progressInterval);
            }
            if (progressBar) {
                progressBar.value = Math.min(1, Math.max(0, progressValue)); // 确保 value 在 0-1 之间
            }
        }, 50);
    }

    // 1. DOMContentLoaded 时，可以认为加载了初始结构，给一个初始进度
    //    并开始一个缓慢的“假”进度推进，模拟资源加载
    console.log("DOM Content Loaded");
    updateProgress(0.1); // 假设 DOM 加载完成占 10%

    // 模拟一些加载过程，缓慢增加到比如 0.8
    // 这个时间可以根据你的页面大致加载时间调整
    // 或者你也可以在 DOMContentLoaded 后就直接跳到比如 0.5
    setTimeout(() => {
        if (progressValue < 0.8) { // 只有在还没到目标时才更新
            console.log("Simulating further loading...");
            updateProgress(0.8, 1000); // 在2秒内从当前进度到0.8
        }
    }, 100); // DOMContentLoaded 后 200ms 开始模拟

    // 2. window.onload 时，所有资源加载完毕
    window.addEventListener('onload', function() {
        console.log("Window Loaded - All resources finished");

        // 确保之前的模拟进度完成
        if (progressInterval) {
            clearInterval(progressInterval);
        }
        progressValue = progressBar ? progressBar.value : 0.8; // 获取当前实际进度

        // 快速将进度条设置为 100%
        updateProgress(1, 300); // 在0.3秒内从当前进度到1

        // 稍作延迟后隐藏加载层，显示主内容
        setTimeout(() => {
            if (loaderOverlay) {
                loaderOverlay.style.opacity = '0';
                // 等待淡出动画完成后再将其 display:none，以便它不再占据交互区域
                setTimeout(() => {
                    loaderOverlay.style.display = 'none';
                }, 500); // 匹配 CSS 中的 transition duration
            }
            if (mainContent) {
                mainContent.classList.add('loaded');
            }
            console.log("Loader hidden, main content shown.");
        }, 100); // 在进度条满后0.1秒执行
    });

    // --- 备用方案：如果 onload 事件由于某些原因未触发或延迟过久 ---
    // 你可以设置一个最长等待时间，之后无论如何都显示内容
    const maxLoadTime = 2000; // 8秒
    setTimeout(() => {
        if (loaderOverlay && loaderOverlay.style.display !== 'none') { // 如果加载层还在显示
            console.warn("Max load time reached. Forcing content display.");
            if (progressInterval) {
                clearInterval(progressInterval);
            }
            if (progressBar) progressBar.value = 1; // 强制满进度

            loaderOverlay.style.opacity = '0';
            setTimeout(() => {
                loaderOverlay.style.display = 'none';
            }, 500);
            if (mainContent) {
                mainContent.classList.add('loaded');
            }
        }
    }, maxLoadTime);

});
</script>


<script>
    function applyInteractiveShadow(selector, shadowType = 'text',defaultShadowOnLeave = 'none') {
        const elements = document.querySelectorAll(selector);

        if (elements.length > 0) {
            elements.forEach(function(currentElement) {
                // 鼠标移动事件处理
                document.addEventListener('mousemove', function(mouseMoveEvent) {
                    const mouseX = mouseMoveEvent.clientX;
                    const mouseY = mouseMoveEvent.clientY;

                    const rect = currentElement.getBoundingClientRect();
                    const elementCenterX = rect.left + rect.width / 2;
                    const elementCenterY = rect.top + rect.height / 2;

                    const sensitivity = 30; // 调整这个值来改变敏感度
                    let offsetX = (elementCenterX - mouseX) / sensitivity;
                    let offsetY = (elementCenterY - mouseY) / sensitivity;

                    const maxOffset = 20; // 阴影最大偏移量
                    offsetX = Math.max(-maxOffset, Math.min(maxOffset, offsetX));
                    offsetY = Math.max(-maxOffset, Math.min(maxOffset, offsetY));

                    const blurRadius = 8; // 模糊半径
                    // 阴影颜色可以根据元素类型或背景调整
                    const shadowColor = shadowType === 'box' ? 'rgba(0, 0, 0, 0.3)' : 'rgba(0, 0, 0, 0.5)';
                    // 对于 box-shadow，还可以有 spread-radius (第四个长度值)
                    const spreadRadius = shadowType === 'box' ? 2 : 0; // 给 box-shadow 加一点扩散

                    if (shadowType === 'text') {
                        currentElement.style.textShadow = `${offsetX}px ${offsetY}px ${blurRadius}px ${shadowColor}`;
                    } else if (shadowType === 'box') {
                        currentElement.style.boxShadow = `${offsetX}px ${offsetY}px ${blurRadius}px ${spreadRadius}px ${shadowColor}`;
                    } else if (shadowType === 'drop') { // 实验性：使用 filter: drop-shadow
                        currentElement.style.filter = `drop-shadow(${offsetX}px ${offsetY}px ${blurRadius}px ${shadowColor})`;
                    }
                });

                // 鼠标离开元素事件处理
                document.addEventListener('mouseleave', function() {
                    if (shadowType === 'text') {
                        
                        currentElement.style.textShadow = '';
                    } else if (shadowType === 'box') {
                        currentElement.style.boxShadow = '';
                    } else if (shadowType === 'drop') {
                        currentElement.style.filter = '';
                    }
                });
            });
        } else {
            console.warn(`未找到任何 class 为 '${selector}' 的元素。`);
        }
    }

    // 应用文字阴影到带有 .interactiveTextShadow class 的元素
    applyInteractiveShadow('.interactiveTextShadow', 'text');

    // 应用盒子阴影到带有 .interactiveBoxShadow class 的元素 (比如你的图片)
    applyInteractiveShadow('.interactiveBoxShadow', 'box');

    // (可选) 如果你想尝试 drop-shadow (对透明PNG效果好)
    applyInteractiveShadow('.interactiveDropShadow', 'drop');
    // 然后给你的 img 标签加上 class="interactiveDropShadow"

</script>
