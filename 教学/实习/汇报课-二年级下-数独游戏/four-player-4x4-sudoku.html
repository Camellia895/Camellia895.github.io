<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4x4 数独竞技场</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --grid-border: #2c3e50;
            --fixed-text: #2c3e50;
            --input-text: #2980b9;
            --selected-bg: #bbdefb;
            --error-bg: #ffcdd2;
            --btn-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            /* 禁止选中文本 */
            user-select: none;
            -webkit-user-select: none; 
            /* 彻底禁用浏览器的所有双指滑动、捏合缩放等手势拦截 */
            touch-action: none; 
            /* 【新增修复】禁止触摸屏长按弹出菜单 */
            -webkit-touch-callout: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color); overflow: hidden;
        }

        /* 顶部控制区 */
        .top-bar {
            position: absolute; top: 0; width: 100%; height: 50px;
            display: flex; justify-content: center; align-items: center;
            background-color: #34495e; z-index: 100;
        }

        .restart-btn {
            padding: 8px 24px; font-size: 18px; font-weight: bold;
            color: #fff; background-color: #e74c3c; border: none;
            border-radius: 25px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .restart-btn:active { background-color: #c0392b; }

        /* 四人分屏布局 */
        .game-container {
            display: flex; width: 100%; height: 100%; padding-top: 50px;
        }

        .player-zone {
            flex: 1; border-right: 2px dashed #bdc3c7; display: flex;
            flex-direction: column; position: relative; overflow: hidden;
        }
        .player-zone:last-child { border-right: none; }

        /* 内容靠下对齐 */
        .play-area {
            margin-top: auto; padding: 20px; display: flex;
            flex-direction: column; align-items: center; padding-bottom: 40px;
        }

        /* 选手信息头 */
        .player-header { text-align: center; margin-bottom: 15px; width: 100%; }
        .player-name { font-size: 24px; font-weight: bold; color: #34495e; }
        .level-info { font-size: 20px; color: #16a085; font-weight: bold; margin: 5px 0;}
        .timer { font-size: 28px; font-weight: bold; color: #e67e22; font-variant-numeric: tabular-nums; }

        /* 4x4数独盘面 */
        .sudoku-board {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
            width: 100%; max-width: 240px; aspect-ratio: 1;
            border: 4px solid var(--grid-border); background-color: #fff; margin-bottom: 20px;
        }

        .cell {
            border: 1px solid #95a5a6; display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: bold; cursor: pointer; transition: background-color 0.1s;
        }
        
        /* 2x2 粗边框 */
        .cell:nth-child(2n) { border-right: 3px solid var(--grid-border); }
        .cell:nth-child(4n) { border-right: none; }
        .cell:nth-child(n+5):nth-child(-n+8), 
        .cell:nth-child(n+13):nth-child(-n+16) { border-bottom: 3px solid var(--grid-border); }
        .cell:nth-child(n+13):nth-child(-n+16) { border-bottom: none; }

        .cell.fixed { color: var(--fixed-text); background-color: #ecf0f1; cursor: not-allowed; }
        .cell.editable { color: var(--input-text); }
        .cell.selected { background-color: var(--selected-bg) !important; }
        .cell.error { background-color: var(--error-bg); animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 屏幕键盘 */
        .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 240px; }
        .key {
            background-color: var(--btn-bg); border: 2px solid #bdc3c7; border-radius: 10px;
            height: 60px; font-size: 24px; font-weight: bold; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 4px 0 #bdc3c7; color: #2c3e50;
        }
        .key:active { transform: translateY(4px); box-shadow: none; }
        .key.delete { background-color: #f39c12; color: #fff; border-color: #d68910; box-shadow: 0 4px 0 #d68910; }
        .key.submit { background-color: #27ae60; color: #fff; border-color: #229954; box-shadow: 0 4px 0 #229954; grid-column: span 3; margin-top: 5px;}

        /* 结算画面 */
        .result-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .rank-text { font-size: 48px; font-weight: bold; margin-bottom: 20px; }
        .rank-1 { color: #f1c40f; text-shadow: 2px 2px 0 #d4ac0d; }
        .rank-2 { color: #95a5a6; text-shadow: 2px 2px 0 #7f8c8d; }
        .rank-3 { color: #cd7f32; text-shadow: 2px 2px 0 #a0522d; }
        .rank-4 { color: #34495e; text-shadow: 2px 2px 0 #2c3e50; }
        .final-time { font-size: 24px; color: #34495e; }

        /* 彩条动画 */
        .confetti-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 5; overflow: hidden; }
        .confetti { position: absolute; width: 10px; height: 20px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="restart-btn" onpointerdown="event.preventDefault(); initGame()">重新开始比赛</button>
    </div>

    <div class="game-container" id="game-container"></div>

<script>
    // 【新增修复】全局拦截并禁止所有右键菜单
    document.addEventListener('contextmenu', function(event) {
        event.preventDefault();
    });

    const LEVEL_CONFIG = [
        { name: "入门级", targetClues: 6 },
        { name: "初级", targetClues: 6 },
        { name: "中级", targetClues: 5 },
        { name: "高级", targetClues: 4 },
        { name: "骨灰级", targetClues: 4 }
    ];
    const MAX_LEVEL = LEVEL_CONFIG.length;
    const NUM_PLAYERS = 4;

    let players = [];
    let currentRank = 1;

    function formatTime(seconds) {
        let m = Math.floor(seconds / 60).toString().padStart(2, '0');
        let s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function createFullBoard() {
        let grid = [
            [1, 2, 3, 4], [3, 4, 1, 2], [2, 1, 4, 3], [4, 3, 2, 1]
        ];
        let map = [1, 2, 3, 4].sort(() => Math.random() - 0.5);
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) grid[r][c] = map[grid[r][c]-1];
        if (Math.random() > 0.5) { let t=grid[0]; grid[0]=grid[1]; grid[1]=t; }
        if (Math.random() > 0.5) { let t=grid[2]; grid[2]=grid[3]; grid[3]=t; }
        if (Math.random() > 0.5) { for(let r=0; r<4; r++){let t=grid[r][0]; grid[r][0]=grid[r][1]; grid[r][1]=t;} }
        if (Math.random() > 0.5) { for(let r=0; r<4; r++){let t=grid[r][2]; grid[r][2]=grid[r][3]; grid[r][3]=t;} }
        return grid;
    }

    function getPossible(board, r, c) {
        let seen = new Set();
        for(let i=0; i<4; i++) {
            if (board[r][i] !== 0) seen.add(board[r][i]);
            if (board[i][c] !== 0) seen.add(board[i][c]);
        }
        let br = Math.floor(r/2)*2, bc = Math.floor(c/2)*2;
        for(let i=0; i<2; i++) {
            for(let j=0; j<2; j++) {
                if (board[br+i][bc+j] !== 0) seen.add(board[br+i][bc+j]);
            }
        }
        let pos = [];
        for(let n=1; n<=4; n++) if(!seen.has(n)) pos.push(n);
        return pos;
    }

    function isSolvableByLogic(board) {
        let b = JSON.parse(JSON.stringify(board));
        let changed = true;
        while(changed) {
            changed = false;
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    if (b[r][c] === 0) {
                        let possible = getPossible(b, r, c);
                        if (possible.length === 1) { 
                            b[r][c] = possible[0];
                            changed = true;
                        }
                    }
                }
            }
        }
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(b[r][c] === 0) return false;
        return true; 
    }

    function generateSudoku(targetClues) {
        let bestPuzzle = null;
        let bestCluesCount = 16;
        let solutionGrid = createFullBoard();

        for (let attempt = 0; attempt < 50; attempt++) {
            let grid = attempt === 0 ? solutionGrid : createFullBoard();
            if (attempt > 0) solutionGrid = grid;
            
            let puzzle = JSON.parse(JSON.stringify(grid));
            let coords = [];
            for (let r=0; r<4; r++) for(let c=0; c<4; c++) coords.push([r,c]);
            coords.sort(() => Math.random() - 0.5); 

            let currentClues = 16;
            for (let [r, c] of coords) {
                if (currentClues <= targetClues) break;
                
                let backup = puzzle[r][c];
                puzzle[r][c] = 0; 
                
                if (isSolvableByLogic(puzzle)) {
                    currentClues--; 
                } else {
                    puzzle[r][c] = backup; 
                }
            }

            if (currentClues === targetClues) {
                return { puzzle, solution: solutionGrid }; 
            }
            if (currentClues < bestCluesCount) {
                bestCluesCount = currentClues;
                bestPuzzle = JSON.parse(JSON.stringify(puzzle));
            }
        }
        return { puzzle: bestPuzzle, solution: solutionGrid };
    }

    function initGame() {
        const container = document.getElementById('game-container');
        container.innerHTML = '';
        currentRank = 1;
        players.forEach(p => clearInterval(p.timerInterval));
        players = [];

        for (let i = 0; i < NUM_PLAYERS; i++) {
            players.push({
                id: i,
                level: 1,
                timeSeconds: 0,
                timerStarted: false,
                timerInterval: null,
                selectedRow: -1,
                selectedCol: -1,
                puzzle: null,
                originalPuzzle: null,
                solution: null,
                finished: false
            });
            createPlayerUI(i, container);
            loadLevel(i);
        }
    }

    function createPlayerUI(id, container) {
        const zone = document.createElement('div');
        zone.className = 'player-zone';
        zone.id = `player-zone-${id}`;

        zone.innerHTML = `
            <div class="confetti-container" id="confetti-${id}"></div>
            <div class="result-screen" id="result-${id}">
                <div class="rank-text" id="rank-text-${id}"></div>
                <div class="final-time" id="final-time-${id}"></div>
            </div>
            <div class="play-area">
                <div class="player-header">
                    <div class="player-name">选手 ${id + 1}</div>
                    <div class="level-info" id="level-info-${id}">难度配置</div>
                    <div class="timer" id="timer-${id}">00:00</div>
                </div>
                <div class="sudoku-board" id="board-${id}"></div>
                <div class="keyboard">
                    <div class="key" onpointerdown="event.preventDefault(); inputNumber(${id}, 1)">1</div>
                    <div class="key" onpointerdown="event.preventDefault(); inputNumber(${id}, 2)">2</div>
                    <div class="key" onpointerdown="event.preventDefault(); inputNumber(${id}, 3)">3</div>
                    <div class="key" onpointerdown="event.preventDefault(); inputNumber(${id}, 4)">4</div>
                    <div class="key delete" onpointerdown="event.preventDefault(); inputNumber(${id}, 0)">删</div>
                    <div class="key submit" onpointerdown="event.preventDefault(); submitBoard(${id})">提 交</div>
                </div>
            </div>
        `;
        container.appendChild(zone);
    }

    function loadLevel(id) {
        const player = players[id];
        const config = LEVEL_CONFIG[player.level - 1];
        document.getElementById(`level-info-${id}`).innerText = config.name;
        
        const { puzzle, solution } = generateSudoku(config.targetClues);
        player.puzzle = JSON.parse(JSON.stringify(puzzle));
        player.originalPuzzle = JSON.parse(JSON.stringify(puzzle)); 
        player.solution = solution;
        player.selectedRow = -1;
        player.selectedCol = -1;

        renderBoard(id);
    }

    function renderBoard(id) {
        const player = players[id];
        const board = document.getElementById(`board-${id}`);
        board.innerHTML = '';

        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${id}-${r}-${c}`;
                
                const val = player.puzzle[r][c];
                const isOriginal = player.originalPuzzle[r][c] !== 0;

                if (val !== 0) {
                    cell.innerText = val;
                }

                if (isOriginal) {
                    cell.classList.add('fixed');
                } else {
                    if (val !== 0) cell.classList.add('editable');
                    
                    cell.onpointerdown = (e) => {
                        e.preventDefault();
                        selectCell(id, r, c);
                    };
                }

                board.appendChild(cell);
            }
        }
    }

    function selectCell(id, r, c) {
        const player = players[id];
        if (player.finished) return;

        if (!player.timerStarted) {
            player.timerStarted = true;
            player.timerInterval = setInterval(() => {
                player.timeSeconds++;
                document.getElementById(`timer-${id}`).innerText = formatTime(player.timeSeconds);
            }, 1000);
        }

        if (player.selectedRow !== -1) {
            const oldCell = document.getElementById(`cell-${id}-${player.selectedRow}-${player.selectedCol}`);
            if (oldCell) oldCell.classList.remove('selected');
        }

        player.selectedRow = r;
        player.selectedCol = c;
        document.getElementById(`cell-${id}-${r}-${c}`).classList.add('selected');
    }

    function inputNumber(id, num) {
        const player = players[id];
        if (player.finished || player.selectedRow === -1) return;

        const cell = document.getElementById(`cell-${id}-${player.selectedRow}-${player.selectedCol}`);
        cell.classList.remove('error');

        if (num === 0) {
            cell.innerText = '';
            player.puzzle[player.selectedRow][player.selectedCol] = 0;
            cell.classList.remove('editable');
        } else {
            cell.innerText = num;
            cell.classList.add('editable');
            player.puzzle[player.selectedRow][player.selectedCol] = num;
        }
    }

    function submitBoard(id) {
        const player = players[id];
        if (player.finished) return;

        let isCorrect = true;
        let isFull = true;

        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                if (player.puzzle[r][c] === 0) isFull = false;
                if (player.puzzle[r][c] !== player.solution[r][c]) isCorrect = false;
            }
        }

        if (isCorrect && isFull) {
            triggerConfetti(id);
            
            if (player.level < MAX_LEVEL) {
                player.level++;
                setTimeout(() => loadLevel(id), 1500);
            } else {
                player.finished = true;
                clearInterval(player.timerInterval);
                showResult(id);
            }
        } else {
            const board = document.getElementById(`board-${id}`);
            board.classList.remove('error');
            void board.offsetWidth; 
            board.classList.add('error');
            setTimeout(() => board.classList.remove('error'), 300);
        }
    }

    function showResult(id) {
        const player = players[id];
        const screen = document.getElementById(`result-${id}`);
        const rankText = document.getElementById(`rank-text-${id}`);
        const timeText = document.getElementById(`final-time-${id}`);

        screen.style.display = 'flex';
        rankText.innerText = `第 ${currentRank} 名`;
        rankText.className = `rank-text rank-${currentRank}`;
        timeText.innerText = `总用时: ${formatTime(player.timeSeconds)}`;
        
        currentRank++;
    }

    function triggerConfetti(id) {
        const container = document.getElementById(`confetti-${id}`);
        const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6'];
        
        for (let i = 0; i < 40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 1 + 1) + 's';
            container.appendChild(conf);

            setTimeout(() => conf.remove(), 2000);
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
